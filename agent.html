<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexLet — Agency Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B1E3D; --navy2:#16305a; --orange:#E8923A; --green:#1B7A4B; --green-bg:#EAF6EF;
  --amber:#B86E20; --amber-bg:#FEF2E7; --red:#C0392B; --red-bg:#FBEAE8; --blue:#2A6FDB; --blue-bg:#E9F2FF;
  --purple:#7C3AED; --purple-bg:#F3EAFB; --txt:#1A2332; --muted:#64748B; --faint:#94A3B8;
  --border:#E2E5EA; --off:#F4F6F9; --bg:#EAEEF5;
  --font:'DM Sans',system-ui,sans-serif; --disp:'DM Serif Display',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--txt)}
.app{display:flex;min-height:100vh}
.sb{width:232px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-logo{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo .nm{font-family:var(--disp);font-size:19px;color:#fff}
.sb-logo .nm b{color:var(--orange);font-weight:400}
.sb-badge{display:inline-flex;align-items:center;gap:5px;margin-top:6px;background:rgba(232,146,58,.15);border:1px solid rgba(232,146,58,.35);color:var(--orange);font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:5px}
.sb-nav{padding:10px 0;flex:1;overflow-y:auto}
.nav{display:flex;align-items:center;gap:11px;padding:10px 16px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;border-left:3px solid transparent;transition:all .12s;user-select:none}
.nav:hover{color:#fff;background:rgba(255,255,255,.04)}
.nav.on{color:#fff;background:rgba(255,255,255,.06);border-left-color:var(--orange)}
.nav .ic{width:17px;text-align:center;flex-shrink:0}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.55)}
.sb-user{display:flex;align-items:center;gap:9px}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--orange);color:var(--navy);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:12px}
.main{flex:1;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 30px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.tb-title{font-size:11px;font-weight:700;letter-spacing:.7px;color:var(--faint);text-transform:uppercase}
.content{padding:26px 30px;max-width:1120px}
h1.pg{font-family:var(--disp);font-size:24px;color:var(--navy);margin-bottom:3px;font-weight:400}
.sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:#fff;color:#475569;border-radius:9px;padding:9px 15px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s}
.btn:hover{border-color:#c5d0dd}
.btn.navy{background:var(--navy);color:#fff;border-color:transparent}
.btn.navy:hover{background:var(--navy2)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.ghost{background:none;border:none;color:var(--muted)}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.kpi .l{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--faint);text-transform:uppercase}
.kpi .v{font-size:25px;font-weight:700;color:var(--navy);margin-top:5px;font-family:var(--disp)}
.kpi .v small{font-size:13px;font-weight:400}
.kpi .s{font-size:11px;color:var(--faint);margin-top:2px}
.panel{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.panel+.panel{margin-top:14px}
.panel-hd{padding:15px 20px;border-bottom:1px solid #EEF1F5;display:flex;align-items:center;justify-content:space-between}
.panel-hd h2{font-size:14px;font-weight:700;color:var(--navy)}
.panel-bd{padding:18px 20px}
.row{display:flex;align-items:center;gap:14px;padding:15px 20px;border-bottom:1px solid #F1F3F6}
.row:last-child{border-bottom:none}
.av{width:40px;height:40px;border-radius:50%;background:var(--bg);color:var(--navy);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pill{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:100px;white-space:nowrap;display:inline-block}
.muted{color:var(--muted)} .faint{color:var(--faint)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--txt);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:#fff;color:var(--txt)}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(42,111,219,.12)}
.fg .hint{font-size:11px;color:var(--faint);margin-top:4px}
.inline2{display:flex;gap:10px}.inline2>*{flex:1}
.steps{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.st{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--faint);padding:5px 11px;border-radius:100px;background:#fff;border:1px solid var(--border)}
.st.on{color:#fff;background:var(--navy);border-color:transparent}
.st.done{color:var(--green);background:var(--green-bg);border-color:transparent}
.st .n{width:17px;height:17px;border-radius:50%;background:currentColor;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center}
.st.on .n{background:#fff;color:var(--navy)} .st.done .n{background:var(--green);color:#fff}
.pipe{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px}
.col{flex:0 0 230px;background:#EEF1F6;border-radius:12px;padding:11px}
.col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 4px}
.col-hd .t{font-size:12px;font-weight:700;color:var(--navy)}
.col-hd .c{font-size:11px;font-weight:700;color:#fff;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.tcard{background:#fff;border:1px solid var(--border);border-radius:9px;padding:11px 12px;margin-bottom:9px}
.tcard .w{font-size:13px;font-weight:700;color:var(--navy)}
.tcard .p{font-size:11px;color:var(--faint);margin:2px 0 8px}
.ov{position:fixed;inset:0;background:rgba(11,30,61,.45);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow-y:auto}
.modal{background:#fff;border-radius:14px;width:100%;max-width:540px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hd h3{font-size:16px;color:var(--navy)}
.modal-bd{padding:20px 22px}
.modal-ft{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:9px}
.x{background:none;border:none;font-size:20px;color:var(--faint);cursor:pointer;line-height:1}
.chk{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:9px;margin-bottom:8px;cursor:pointer}
.chk.on{border-color:var(--green);background:var(--green-bg)}
.chk .box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.chk.on .box{background:var(--green);border-color:var(--green)}
.doc{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--border);border-radius:9px;margin-bottom:8px}
.doc .di{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.empty{padding:34px;text-align:center;color:var(--muted);font-size:13px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.3);opacity:0;transition:opacity .2s,transform .2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.note{background:var(--blue-bg);border:1px solid rgba(42,111,219,.2);border-radius:10px;padding:13px 15px;font-size:12.5px;color:var(--txt);line-height:1.55}
.note.warn{background:var(--amber-bg);border-color:rgba(184,110,32,.25)}
@media print{.sb,.topbar,.no-print,.back{display:none!important}.main{width:100%}.content{padding:0;max-width:none}#invoice-doc{box-shadow:none!important;border:none!important;max-width:none!important}body{background:#fff}}
.tl{position:relative;padding-left:22px}
.tl::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--border)}
.tl-item{position:relative;padding:0 0 16px}
.tl-item::before{content:'';position:absolute;left:-19px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--blue);border:2px solid #fff}
.back{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);cursor:pointer;margin-bottom:14px}
.kv{display:flex;gap:8px;font-size:13px;padding:6px 0;border-bottom:1px solid #F4F6F9}
.kv .k{color:var(--faint);width:150px;flex-shrink:0}
.kv .v{color:var(--txt);font-weight:500}
.feebox{display:flex;align-items:center;gap:8px;background:var(--off);border:1px solid var(--border);border-radius:9px;padding:6px 10px}
.feebox input{width:64px;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-family:inherit;font-size:14px;font-weight:700;text-align:center;color:var(--navy)}
</style>
</head>
<body>
<div class="app">
  <aside class="sb">
    <div class="sb-logo"><div class="nm">Nex<b>Let</b></div><div class="sb-badge">AGENCY MODE</div></div>
    <nav class="sb-nav" id="nav"></nav>
    <div class="sb-foot">
      <div id="scheme-foot" style="margin:0 0 12px;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px"></div>
      <div class="sb-user"><div class="sb-av">SD</div><div>Saurabh — Agent</div></div>
      <a href="landlord.html?portal=landlord" style="display:block;margin-top:10px;font-size:11px;color:rgba(255,255,255,.5);text-decoration:none">↩ Switch to landlord portal</a>
    </div>
  </aside>
  <main class="main">
    <div class="topbar"><span class="tb-title" id="tb-title">Dashboard</span><div id="tb-actions"></div></div>
    <div class="content" id="view"></div>
  </main>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<!-- Supabase (same project as landlord.html / tenant.html) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
// NexLet Agency Portal — functional front-end (local state demo).
// Same architecture/design as landlord.html. A developer wires this
// to the shared Supabase backend (see DEV-SPEC-agency-portal.md):
// agencies → landlords → properties hierarchy + RLS.
// ─────────────────────────────────────────────────────────────
const LS='nexlet_agency_v3';
const DEF_FEE=7.5;        // default full-management % of monthly rent (editable per landlord)
const DEF_WEEKS=3;        // default let-only fee = weeks of rent (editable per landlord)
const REF_PARTNERS=['Vouch','FCC Paragon','HomeLet','Van Mildert','Goodlord (Acquire)'];

// ─────────────────────────────────────────────────────────────
// SUPABASE DATA LAYER  (Session 36 — wires this portal to the shared backend)
// Same project as landlord.html / tenant.html. Security model: DEV-SPEC-agency-portal.md.
//  • LIVE mode  → real Supabase, scoped to window._agencyId, protected by RLS.
//  • DEMO mode  → local-state only (open with ?demo=1). Touches no real data.
// ─────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://mahtcfukgzbonwibtsxz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1haHRjZnVrZ3pib253aWJ0c3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MjQ2MDAsImV4cCI6MjA5MTIwMDYwMH0.-wC55rGp1WFKfjKR3EhuXqAPDiWJ4w_e2LBXjHr_y5Y';
let sb=null; try{ const { createClient }=window.supabase; sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY); }catch(e){ console.warn('Supabase client unavailable — demo only',e); }
let LIVE=false;                 // set true only after the auth gateway passes
window._agencyId=null;          // every LIVE query is scoped to this agency

// ── row ⇄ in-memory-object mappers (snake_case DB ⇄ camelCase S) ──
const rowToAgency=r=>({name:r.name||'',address:r.address||'',redress:r.redress_scheme||'',redressNo:r.redress_no||'',cmp:r.cmp_scheme||'Not holding client money',cmpNo:r.cmp_no||'',refPartner:r.ref_partner||'',icoNo:r.ico_no||'',vatRegistered:!!r.vat_registered,vatNumber:r.vat_number||'',invoiceSeq:r.invoice_seq||0,paymentTerms:r.payment_terms||14});
const agencyToRow=a=>({name:a.name,address:a.address,redress_scheme:a.redress,redress_no:a.redressNo,cmp_scheme:a.cmp,cmp_no:a.cmpNo,ref_partner:a.refPartner,ico_no:a.icoNo,vat_registered:!!a.vatRegistered,vat_number:a.vatNumber,invoice_seq:a.invoiceSeq||0,payment_terms:a.paymentTerms||14,updated_at:new Date().toISOString()});
const rowToLandlord=r=>({id:r.id,name:r.name||'',email:r.email||'',phone:r.phone||'',address:r.address||'',nrl:!!r.nrl,prsReg:r.prs_reg||'',payout:r.payout||'',contactPref:r.contact_pref||'Email',aml:!!r.aml_verified,ownership:!!r.ownership_verified,service:r.service||'full',feePct:r.fee_pct,letWeeks:r.let_weeks,agreement:!!r.agreement_signed,status:r.status||'pending',docs:r.docs||{},comms:r.comms||[]});
const landlordToRow=l=>({id:l.id,agency_id:window._agencyId,name:l.name,email:l.email,phone:l.phone,address:l.address,nrl:!!l.nrl,prs_reg:l.prsReg,payout:l.payout,contact_pref:l.contactPref,aml_verified:!!l.aml,ownership_verified:!!l.ownership,service:l.service,fee_pct:l.feePct,let_weeks:l.letWeeks,agreement_signed:!!l.agreement,status:l.status,docs:l.docs||{},comms:l.comms||[],updated_at:new Date().toISOString()});
const rowToProp=r=>({id:r.id,landlordId:r.landlord_id,address:r.address||'',city:r.city||'',rent:r.rent||0,beds:r.beds||1,feePct:r.fee_pct,certs:r.certs||{},tenant:r.tenant||undefined});
const propToRow=p=>({id:p.id,agency_id:window._agencyId,landlord_id:p.landlordId,address:p.address,city:p.city,rent:p.rent||0,beds:p.beds||1,fee_pct:p.feePct,certs:p.certs||{},tenant:p.tenant||null});
const rowToRef=r=>({id:r.id,applicant:r.applicant||'',propertyId:r.property_id||'',income:r.income||'',docs:r.docs||{id:false,rtr:false,income:false,employer:false,prevll:false},credit:r.credit_ref||'',creditState:r.credit_state||'not_requested',status:r.status||'none',note:r.note||''});
const refToRow=r=>({id:r.id,agency_id:window._agencyId,applicant:r.applicant,property_id:r.propertyId,income:parseInt(r.income)||0,docs:r.docs||{},credit_ref:r.credit||'',credit_state:r.creditState||'not_requested',status:r.status||'none',note:r.note||'',updated_at:new Date().toISOString()});
const rowToTen=r=>({id:r.id,who:r.who||'',propertyId:r.property_id||'',stage:r.stage||'instructed'});
const tenToRow=t=>({id:t.id,agency_id:window._agencyId,who:t.who,property_id:t.propertyId,stage:t.stage,updated_at:new Date().toISOString()});
const rowToInv=r=>({id:r.id,no:r.no||'',landlordId:r.landlord_id||'',propertyId:r.property_id||'',type:r.type||'full',periodLabel:r.period_label||'',issued:r.issued||'',supplyFrom:r.supply_from||'',supplyTo:r.supply_to||'',lines:r.lines||[],vat:!!r.vat,status:r.status||'draft'});
const invToRow=i=>({id:i.id,agency_id:window._agencyId,no:i.no,landlord_id:i.landlordId,property_id:i.propertyId,type:i.type,period_label:i.periodLabel,issued:i.issued||null,supply_from:i.supplyFrom||null,supply_to:i.supplyTo||null,lines:i.lines||[],vat:!!i.vat,status:i.status});

// ── targeted writes (§4). No-ops in DEMO mode; toast on error in LIVE. ──
async function _w(promise){ if(!LIVE)return; try{ const {error}=await promise; if(error){console.error(error);toast('⚠ Save failed — retry',1);} }catch(e){ console.error(e); toast('⚠ Save failed — retry',1); } }
const pushLandlord =l  =>_w(sb.from('agency_landlords').upsert(landlordToRow(l)));
const pushProperty =p  =>_w(sb.from('properties').upsert(propToRow(p)));
const pushTenancy  =t  =>_w(sb.from('tenancies').upsert(tenToRow(t)));
const pushReference=r  =>_w(sb.from('agency_references').upsert(refToRow(r)));
const pushInvoice  =i  =>_w(sb.from('invoices').upsert(invToRow(i)));
const pushAgency   =() =>_w(sb.from('agencies').update(agencyToRow(S.agency)).eq('id',window._agencyId));

// ── hydrate S from Supabase (LIVE) ──
async function loadData(agency){
  S.agency=rowToAgency(agency);
  const q=t=>sb.from(t).select('*').eq('agency_id',window._agencyId);
  const [ll,pr,rf,tn,iv]=await Promise.all([sb.from('agency_landlords').select('*').eq('agency_id',window._agencyId),q('properties'),q('agency_references'),q('tenancies'),q('invoices')]);
  S.landlords =(ll.data||[]).map(rowToLandlord);
  S.properties=(pr.data||[]).map(rowToProp);
  S.references=(rf.data||[]).map(rowToRef);
  S.tenancies =(tn.data||[]).map(rowToTen);
  S.invoices  =(iv.data||[]).map(rowToInv);
}

// ── auth gateway (§2a-B) + boot ──
async function boot(){
  const demo=new URLSearchParams(location.search).has('demo');
  if(demo || !sb){ LIVE=false; render(); return; }              // explicit demo, or lib missing
  document.getElementById('view').innerHTML='<div class="empty">Loading your agency…</div>';
  const { data:{ session } }=await sb.auth.getSession();
  if(!session){ location.href='login.html'; return; }            // no session → login
  const { data:agency }=await sb.from('agencies').select('*').eq('owner_user_id',session.user.id).maybeSingle();
  if(!agency){ location.href='landlord.html'; return; }          // not an agent → landlord app
  LIVE=true; window._agencyId=agency.id;
  try{ await loadData(agency); }catch(e){ console.error(e); toast('⚠ Could not load agency data',1); }
  render();
}


const SEED={
  agency:{ name:'', address:'', redress:'', redressNo:'', cmp:'Not holding client money', cmpNo:'', refPartner:'', icoNo:'', vatRegistered:false, vatNumber:'', invoiceSeq:0, paymentTerms:14 },
  landlords:[],
  properties:[],
  references:[],
  tenancies:[],
  invoices:[]
};

let S=load();
function load(){ try{const j=JSON.parse(localStorage.getItem(LS));if(j&&j.landlords)return j;}catch(e){} return JSON.parse(JSON.stringify(SEED)); }
function save(){ if(LIVE)return; try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){} }  // LIVE persists via targeted push* writes
function uid(p){ return p+Math.random().toString(36).slice(2,8); }
function P(id){ return S.properties.find(x=>x.id===id)||{}; }
function L(id){ return S.landlords.find(x=>x.id===id)||{}; }
function gbp(n){ return '£'+Math.round(n||0).toLocaleString(); }
function today(){ return new Date().toISOString().slice(0,10); }

const STAGES=[
  {k:'instructed',t:'Instructed',c:'#64748B'},{k:'marketing',t:'Marketing',c:'#2A6FDB'},
  {k:'referencing',t:'Referencing',c:'#D98324'},{k:'contract',t:'Contract & e-sign',c:'#7C3AED'},
  {k:'movein',t:'Move-in',c:'#0E7490'},{k:'managed',t:'Managed',c:'#1B7A4B'}
];
const SVC={full:{label:'Full management',bg:'var(--green-bg)',color:'var(--green)'},letonly:{label:'Let-only',bg:'var(--off)',color:'#475569'}};
const STATUS={active:{label:'Active',bg:'var(--green-bg)',color:'var(--green)'},pending:{label:'Agreement pending',bg:'var(--amber-bg)',color:'var(--amber)'}};
const RAG={green:{label:'● Pass',bg:'var(--green-bg)',color:'var(--green)'},amber:{label:'● Caution',bg:'var(--amber-bg)',color:'var(--amber)'},red:{label:'● Fail',bg:'var(--red-bg)',color:'var(--red)'},none:{label:'Not started',bg:'var(--off)',color:'#475569'}};
const CREDIT={not_requested:{label:'Credit: not requested',bg:'var(--off)',color:'#94A3B8'},requested:{label:'Credit: requested',bg:'var(--blue-bg)',color:'var(--blue)'},in_progress:{label:'Credit: in progress',bg:'var(--amber-bg)',color:'var(--amber)'},complete:{label:'Credit: report attached',bg:'var(--green-bg)',color:'var(--green)'}};

const NAV=[
  {k:'dashboard',ic:'▦',t:'Agency Dashboard'},{k:'landlords',ic:'⚇',t:'Landlords'},
  {k:'pipeline',ic:'◫',t:'Tenancy Progression'},{k:'referencing',ic:'◷',t:'Referencing'},
  {k:'properties',ic:'⌂',t:'Properties'},{k:'invoices',ic:'£',t:'Invoices'},{k:'settings',ic:'⚙',t:'Agency Settings'}
];
let view='dashboard', sel=null, llView=false;
function go(v,id){ view=v; if(id!==undefined)sel=id; window.scrollTo(0,0); render(); }

// ── COMPLIANCE RAG (same logic family as the landlord app) ──
function daysUntil(d){ if(!d) return null; return Math.round((new Date(d)-new Date())/864e5); }
function certRAG(d){ if(!d) return {k:'missing',label:'Missing',bg:'var(--red-bg)',color:'var(--red)'}; const n=daysUntil(d); if(n<0) return {k:'expired',label:'Expired',bg:'var(--red-bg)',color:'var(--red)'}; if(n<30) return {k:'soon',label:n+'d left',bg:'var(--amber-bg)',color:'var(--amber)'}; return {k:'ok',label:'Valid',bg:'var(--green-bg)',color:'var(--green)'}; }
function fmtDate(d){ if(!d) return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function propCompliance(p){ const c=p.certs||{}; const items=[['gas','Gas Safety',c.gas],['eicr','EICR (Electrical)',c.eicr],['epc','EPC',c.epc]]; const done=items.filter(([k,l,d])=>{const r=certRAG(d);return r.k==='ok'||r.k==='soon';}).length; return {items,pct:Math.round(done/items.length*100)}; }

function render(){
  document.getElementById('nav').innerHTML=NAV.map(n=>`<div class="nav ${n.k===view||(view==='landlord'&&n.k==='landlords')?'on':''}" onclick="go('${n.k}')"><span class="ic">${n.ic}</span>${n.t}</div>`).join('');
  const sf=document.getElementById('scheme-foot');
  sf.innerHTML = S.agency.redress
    ? `<div style="font-size:11px;color:rgba(255,255,255,.6)">Redress scheme</div><div style="font-size:11.5px;color:var(--green);font-weight:700;margin-top:2px">✓ ${esc(S.agency.redress)}</div>`
    : `<div style="font-size:11px;color:rgba(255,255,255,.6)">Redress scheme</div><div style="font-size:11.5px;color:#F5B301;font-weight:700;margin-top:2px">⏳ Membership pending</div>`;
  const _titleMap={landlord:'Landlords',property:'Properties',llportal:'Landlord Portal',invoice:'Invoices'};
  document.getElementById('tb-title').textContent=(NAV.find(n=>n.k===view)||{}).t||_titleMap[view]||'';
  document.getElementById('tb-actions').innerHTML=topActions();
  document.getElementById('view').innerHTML=({
    dashboard:vDashboard, landlords:vLandlords, landlord:vLandlordDetail, pipeline:vPipeline,
    referencing:vReferencing, properties:vProperties, property:vPropertyDetail, llportal:vLandlordPortal,
    invoices:vInvoices, invoice:vInvoiceDetail, settings:vSettings
  }[view]||vDashboard)();
}
function topActions(){
  if(view==='landlords'||view==='dashboard') return `<button class="btn navy" onclick="openOnboard()">＋ Onboard a landlord</button>`;
  if(view==='referencing') return `<button class="btn navy" onclick="openReference()">＋ New reference</button>`;
  if(view==='invoices') return `<button class="btn navy" onclick="openInvoice()">＋ Create invoice</button>`;
  return '';
}
function feeOf(l){ return l.service==='full' ? (l.feePct!=null?l.feePct:DEF_FEE) : (l.letWeeks!=null?l.letWeeks:DEF_WEEKS); }
// Management fee is tagged PER PROPERTY (varies per property — e.g. family/friends rate).
// Falls back to the landlord's default, then the agency default.
function propFee(p){ const l=L(p.landlordId); return p.feePct!=null?p.feePct : (l.feePct!=null?l.feePct:DEF_FEE); }
// Total monthly management fee a full-management landlord generates (sum of their properties).
function landlordMonthlyFee(l){ return S.properties.filter(p=>p.landlordId===l.id).reduce((s,p)=>s+p.rent*propFee(p)/100,0); }

// ── DASHBOARD ──
function vDashboard(){
  const mgmt=S.landlords.filter(l=>l.service==='full').length;
  const lo=S.landlords.filter(l=>l.service==='letonly').length;
  let fees=0;
  S.properties.forEach(p=>{ if(L(p.landlordId).service==='full') fees+=p.rent*propFee(p)/100; });
  const managedRent=S.properties.filter(p=>L(p.landlordId).service==='full').reduce((s,p)=>s+(p.rent||0),0);
  const pending=S.landlords.filter(l=>!l.agreement).length;
  return `
    <h1 class="pg">Good evening, Saurabh</h1>
    <div class="sub">Your managed portfolio at a glance</div>
    <div class="grid4">
      <div class="kpi"><div class="l">Landlords</div><div class="v">${S.landlords.length}</div><div class="s">${mgmt} full mgmt · ${lo} let-only</div></div>
      <div class="kpi"><div class="l">Properties</div><div class="v">${S.properties.length}</div><div class="s">across your landlords</div></div>
      <div class="kpi"><div class="l">Managed rent</div><div class="v">${gbp(managedRent)}<small>/mo</small></div><div class="s">tenant → landlord direct</div></div>
      <div class="kpi"><div class="l">Your fees /mo</div><div class="v" style="color:var(--green)">${gbp(fees)}</div><div class="s">from management %</div></div>
    </div>
    ${pending?`<div class="note warn" style="margin-bottom:18px">⏳ <b>${pending} landlord${pending>1?'s':''}</b> awaiting a signed management agreement — you can market once it's signed, not before.</div>`:''}
    <div class="panel">
      <div class="panel-hd"><h2>Your landlords</h2><span class="faint" style="font-size:12px">Click a landlord to open their record</span></div>
      ${S.landlords.map(landlordRow).join('')}
    </div>`;
}
function landlordRow(l){
  const props=S.properties.filter(p=>p.landlordId===l.id);
  const rent=props.reduce((s,p)=>s+(p.rent||0),0);
  const sv=SVC[l.service]||SVC.full, st=STATUS[l.status]||STATUS.pending;
  const feeTxt = l.service==='full' ? gbp(landlordMonthlyFee(l))+'/mo' : (rent?gbp(rent/4.345*feeOf(l)):'—');
  const _rates=[...new Set(props.map(p=>propFee(p)))];
  const feeBasis = l.service==='full' ? (_rates.length<=1?(_rates[0]!=null?_rates[0]:DEF_FEE)+'%':'mixed rates') : feeOf(l)+' wks · one-off';
  return `<div class="row" onclick="go('landlord','${l.id}')" style="cursor:pointer">
    <div class="av">${initials(l.name)}</div>
    <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600;color:var(--navy)">${esc(l.name)}${l.nrl?' <span class="pill" style="background:var(--purple-bg);color:var(--purple)">Non-resident</span>':''}</div>
      <div class="faint" style="font-size:12px">${props.length?props.map(p=>esc(p.address)).join(', '):'No properties yet'}${rent?' · '+gbp(rent)+'/mo':''}</div></div>
    <span class="pill" style="background:${sv.bg};color:${sv.color}">${sv.label}</span>
    <div style="width:96px;text-align:right"><div style="font-size:14px;font-weight:700;color:var(--navy)">${feeTxt}</div><div class="faint" style="font-size:10.5px">${feeBasis}</div></div>
    <span class="pill" style="background:${st.bg};color:${st.color}">${st.label}</span>
  </div>`;
}

// ── PIPELINE ──
function vPipeline(){
  return `<h1 class="pg">Tenancy Progression</h1><div class="sub">Track every let from instruction to managed — click a card to advance it.</div>
    <div class="pipe">${STAGES.map(stg=>{
      const cards=S.tenancies.filter(t=>t.stage===stg.k);
      return `<div class="col"><div class="col-hd"><span class="t">${stg.t}</span><span class="c" style="background:${stg.c}">${cards.length}</span></div>
        ${cards.map(t=>tenancyCard(t,stg)).join('')||`<div class="faint" style="font-size:11px;padding:6px 4px">—</div>`}</div>`;
    }).join('')}</div>
    <div class="note" style="margin-top:18px"><b>Renters' Rights Act payment order:</b> before the agreement is signed you may only take a holding deposit (max 1 week) + security deposit (max 5 weeks) — rent is taken only once the tenancy is executed. The Referencing stage feeds the <a href="#" onclick="go('referencing');return false" style="color:var(--blue);font-weight:600">Referencing</a> module.</div>`;
}
function tenancyCard(t,stg){
  const idx=STAGES.findIndex(s=>s.k===t.stage); const next=STAGES[idx+1];
  return `<div class="tcard"><div class="w">${esc(t.who)}</div><div class="p">${esc(P(t.propertyId).address||'')}</div>
    ${next?`<button class="btn sm" onclick="advance('${t.id}')">Advance → ${next.t}</button>`:`<span class="pill" style="background:var(--green-bg);color:var(--green)">● Live</span>`}</div>`;
}
function advance(id){ const t=S.tenancies.find(x=>x.id===id); const i=STAGES.findIndex(s=>s.k===t.stage); if(STAGES[i+1]){t.stage=STAGES[i+1].k;save();pushTenancy(t);render();toast('Moved to '+STAGES[i+1].t);} }

// ── REFERENCING ──
function vReferencing(){
  const partner=S.agency.refPartner;
  return `<h1 class="pg">Tenant Referencing</h1><div class="sub">Collect documents, assess affordability, and record the outcome. Credit/Open-Banking checks run via your referencing partner.</div>
    <div class="note" style="margin-bottom:16px"><b>How this works (no FCA licence needed):</b> NexLet runs the full in-house workflow — employer & previous-landlord references, proof of income, ID, Right-to-Rent — plus an affordability test (income ≥ 30× monthly rent). The regulated <b>credit search</b> (CCJs, score) and Open-Banking income come from a referencing partner${partner?` — yours is set to <b>${esc(partner)}</b>`:` (set one in Agency Settings)`}. The "Request credit check" button is the API hook your developer connects; until then you run it in the partner portal and attach the result.</div>
    <div class="panel">${S.references.length?S.references.map(refCard).join(''):`<div class="empty">No references yet. Click "New reference".</div>`}</div>`;
}
function refCard(r){
  const rag=RAG[r.status]||RAG.none; const cr=CREDIT[r.creditState||'not_requested'];
  const docs=r.docs||{}; const got=Object.values(docs).filter(Boolean).length;
  const rent=P(r.propertyId).rent||0; const need=rent*30; const afford=r.income>=need;
  return `<div class="row" style="align-items:flex-start;cursor:pointer" onclick="openReference('${r.id}')">
    <div class="av">${initials(r.applicant)}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:14px;font-weight:600;color:var(--navy)">${esc(r.applicant)}</div>
      <div class="faint" style="font-size:12px;margin:2px 0 8px">${esc(P(r.propertyId).address||'—')} · ${gbp(rent)}/mo</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <span class="pill" style="background:var(--off);color:#475569">${got}/5 docs</span>
        ${r.income?`<span class="pill" style="background:${afford?'var(--green-bg)':'var(--amber-bg)'};color:${afford?'var(--green)':'var(--amber)'}">Affordability ${afford?'OK':'tight'} (${gbp(r.income)}/yr)</span>`:''}
        <span class="pill" style="background:${cr.bg};color:${cr.color}">${cr.label}</span>
      </div>
    </div>
    <span class="pill" style="background:${rag.bg};color:${rag.color}">${rag.label}</span>
  </div>`;
}

function nextInvoiceNo(){ const n=(S.agency.invoiceSeq||0)+1; S.agency.invoiceSeq=n; return 'INV-'+String(n).padStart(4,'0'); }
function invTotal(inv){ const net=(inv.lines||[]).reduce((s,l)=>s+(parseFloat(l.net)||0),0); const vat=inv.vat?net*0.2:0; return {net,vat,gross:net+vat}; }
function invStatusPill(s){ const m={draft:['Draft','var(--off)','#475569'],sent:['Sent','var(--blue-bg)','var(--blue)'],paid:['Paid','var(--green-bg)','var(--green)'],overdue:['Overdue','var(--red-bg)','var(--red)']}[s]||['Draft','var(--off)','#475569']; return `<span class="pill" style="background:${m[1]};color:${m[2]}">${m[0]}</span>`; }
function money2(n){ return '£'+(Math.round((n||0)*100)/100).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function vInvoices(){
  const invs=S.invoices||[];

  return `<h1 class="pg">Invoices</h1><div class="sub">Bill your management fees — quarterly, in advance. Sequential numbering, ${S.agency.vatRegistered?'VAT':'non-VAT'} invoices, stored for your records.</div>

function openInvoice(){
  const mgmt=S.landlords.filter(l=>l.service==='full'&&S.properties.some(p=>p.landlordId===l.id));

function openInvoiceFor(id){ IV={landlordId:id,type:'management',quarter:_curQuarter(),status:'draft'}; renderInvoice(); }
function _curQuarter(){ const m=new Date().getMonth(); const q=Math.floor(m/3); const y=new Date().getFullYear(); const labels=[['Q1','Jan–Mar',0,2],['Q2','Apr–Jun',3,5],['Q3','Jul–Sep',6,8],['Q4','Oct–Dec',9,11]]; return {idx:q,y}; }
function _quarterDates(q){ const labels=[['Q1','Jan–Mar',0],['Q2','Apr–Jun',3],['Q3','Jul–Sep',6],['Q4','Oct–Dec',9]]; const [lab,span,m]=labels[q.idx]; const from=new Date(q.y,m,1); const to=new Date(q.y,m+3,0); return {label:`${lab} ${q.y} (${span})`,from:from.toISOString().slice(0,10),to:to.toISOString().slice(0,10)}; }
function renderInvoice(){
  const l=L(IV.landlordId); const props=S.properties.filter(p=>p.landlordId===IV.landlordId);
  const rent=props.reduce((s,p)=>s+(p.rent||0),0);
  const llOpts=S.landlords.map(x=>`<option value="${x.id}" ${x.id===IV.landlordId?'selected':''}>${esc(x.name)} — ${(SVC[x.service]||SVC.full).label}</option>`).join('');
  const qd=_quarterDates(IV.quarter);

    const lines=props.map(p=>({d:`${esc(p.address)} · ${propFee(p)}% of ${gbp(p.rent)}/mo × 3`,n:p.rent*propFee(p)/100*3}));

  } else { net=rent/4.345*feeOf(l); lineHtml=`<div style="display:flex;justify-content:space-between"><span>Let-only fee · ${feeOf(l)} weeks' rent (one-off)</span><b>${money2(net)}</b></div>`; }
  const vat=S.agency.vatRegistered;
  const body=`
    <div class="fg"><label>Bill to (landlord)</label><select id="iv-ll" onchange="IV.landlordId=this.value;renderInvoice()">${llOpts}</select></div>

      ${[0,1,2,3].map(i=>`<option value="${i}" ${IV.quarter.idx===i?'selected':''}>${_quarterDates({idx:i,y:IV.quarter.y}).label}</option>`).join('')}</select></div>
    <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12.5px;line-height:1.7;margin-bottom:6px">

      ${vat?`<div style="display:flex;justify-content:space-between"><span class="faint">VAT @ 20%</span><b>${money2(net*0.2)}</b></div>`:`<div class="faint" style="font-size:11.5px;margin-top:3px">Not VAT registered — no VAT charged.</div>`}
      <div style="display:flex;justify-content:space-between;border-top:1px solid var(--border);margin-top:6px;padding-top:6px"><b>Total due</b><b style="color:var(--navy)">${money2(vat?net*1.2:net)}</b></div>
    </div>

  modal('Create invoice', body, `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn navy" onclick="createInvoice()">Create invoice</button>`);
}
function createInvoice(){

// ── ONBOARDING WIZARD ──
let OB=null;
function openOnboard(){ OB={step:1,name:'',email:'',phone:'',address:'',nrl:false,prsReg:'',payout:'1st',contactPref:'Email',idDoc:'',ownDoc:'',aml:false,ownership:false,service:'full',feePct:DEF_FEE,letWeeks:DEF_WEEKS,addr:'',city:'',rent:'',beds:'2',agreement:false}; renderOnboard(); }
function obNext(){
  if(OB.step===1){ OB.name=val('ob-name');OB.email=val('ob-email');OB.phone=val('ob-phone');OB.address=val('ob-address');OB.prsReg=val('ob-prs');OB.payout=val('ob-payout');OB.contactPref=val('ob-pref'); if(!OB.name){toast('Enter the landlord name',1);return;} }
  if(OB.step===4){ OB.addr=val('ob-addr');OB.city=val('ob-city');OB.rent=val('ob-rent');OB.beds=val('ob-beds'); }
  if(OB.step===5){ OB.service=val('ob-service'); OB.feePct=parseFloat(val('ob-fee'))||DEF_FEE; OB.letWeeks=parseFloat(val('ob-weeks'))||DEF_WEEKS; }
  OB.step++; renderOnboard();
}
function obBack(){ if(OB.step===1){closeModal();return;} OB.step--; renderOnboard(); }
function obFinish(){
  const id=uid('l');
  const ll={id,name:OB.name,email:OB.email,phone:OB.phone,address:OB.address,nrl:OB.nrl,prsReg:OB.prsReg,payout:OB.payout,contactPref:OB.contactPref,
    aml:OB.aml,ownership:OB.ownership,service:OB.service,feePct:OB.feePct,letWeeks:OB.letWeeks,agreement:OB.agreement,status:OB.agreement?'active':'pending',
    docs:{id:OB.idDoc||'',ownership:OB.ownDoc||'',agreement:OB.agreement?'mgmt_agreement.pdf':''},
    comms:[{id:uid('c'),date:today(),type:'Note',note:'Landlord onboarded · '+SVC[OB.service].label+(OB.agreement?' · agreement signed':' · agreement pending')}]};
  S.landlords.push(ll); pushLandlord(ll);
  if(OB.addr){ const pid=uid('p'); const pp={id:pid,landlordId:id,address:OB.addr,city:OB.city,rent:parseInt(OB.rent)||0,beds:parseInt(OB.beds)||1}; S.properties.push(pp); pushProperty(pp);
    const tn={id:uid('t'),who:OB.addr,propertyId:pid,stage:'instructed'}; S.tenancies.push(tn); pushTenancy(tn); }
  const nm=OB.name, signed=OB.agreement;
  save(); closeModal(); go('landlord',id); toast('✓ '+nm+' onboarded'+(signed?' — agreement signed':' — send the agreement to go live'));
}
function renderOnboard(){
  const s=OB.step;
  const labels=['Details','AML / ID','Ownership','Property','Service & fee','Agreement'];
  const stepper=`<div class="steps">${labels.map((l,i)=>`<div class="st ${s===i+1?'on':s>i+1?'done':''}"><span class="n">${s>i+1?'✓':i+1}</span>${l}</div>`).join('')}</div>`;
  let body='';
  if(s===1) body=`<div class="fg"><label>Full name *</label><input id="ob-name" value="${esc(OB.name)}" placeholder="Landlord's name"></div>
    <div class="inline2"><div class="fg"><label>Email</label><input id="ob-email" value="${esc(OB.email)}" placeholder="name@email.com"></div>
    <div class="fg"><label>Phone</label><input id="ob-phone" value="${esc(OB.phone)}"></div></div>
    <div class="fg"><label>Correspondence address</label><input id="ob-address" value="${esc(OB.address)}"></div>
    <div class="inline2"><div class="fg"><label>PRS Database reg. no.</label><input id="ob-prs" value="${esc(OB.prsReg)}" placeholder="verify before instruction"></div>
    <div class="fg"><label>Preferred contact</label><select id="ob-pref"><option ${OB.contactPref==='Email'?'selected':''}>Email</option><option ${OB.contactPref==='Phone'?'selected':''}>Phone</option><option ${OB.contactPref==='WhatsApp'?'selected':''}>WhatsApp</option></select></div></div>
    <div class="inline2"><div class="fg"><label>Rent payout date</label><select id="ob-payout"><option ${OB.payout==='1st'?'selected':''}>1st</option><option ${OB.payout==='15th'?'selected':''}>15th</option><option ${OB.payout==='Last working day'?'selected':''}>Last working day</option></select></div>
    <div class="fg"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" style="width:auto" ${OB.nrl?'checked':''} onchange="OB.nrl=this.checked"> Lives abroad (Non-Resident Landlord)</label><div class="hint">If abroad, the NRL scheme applies — tax deducted unless registered.</div></div></div>`;
  if(s===2) body=`<div class="note" style="margin-bottom:14px">Anti-money-laundering / financial sanctions check — required before you can act. Upload the landlord's passport or driving licence (AI-scanned & stored in production).</div>
    <div class="fg"><label>ID document</label><div style="display:flex;gap:8px"><input id="ob-iddoc" value="${esc(OB.idDoc)}" placeholder="filename or reference" style="flex:1"><button class="btn" onclick="OB.idDoc=val('ob-iddoc')||'passport.pdf';OB.aml=true;renderOnboard()">Attach</button></div></div>
    <div class="chk ${OB.aml?'on':''}" onclick="OB.aml=!OB.aml;renderOnboard()"><div class="box">${OB.aml?'✓':''}</div><div><div style="font-weight:600;font-size:13px">ID verified &amp; AML check passed</div><div class="faint" style="font-size:11px">${OB.idDoc?esc(OB.idDoc):'Passport / driving licence on file'}</div></div></div>`;
  if(s===3) body=`<div class="note" style="margin-bottom:14px">Confirms the landlord is entitled to let — title register, mortgage statement or council tax bill.</div>
    <div class="fg"><label>Proof of ownership</label><div style="display:flex;gap:8px"><input id="ob-owndoc" value="${esc(OB.ownDoc)}" placeholder="filename or reference" style="flex:1"><button class="btn" onclick="OB.ownDoc=val('ob-owndoc')||'title_register.pdf';OB.ownership=true;renderOnboard()">Attach</button></div></div>
    <div class="chk ${OB.ownership?'on':''}" onclick="OB.ownership=!OB.ownership;renderOnboard()"><div class="box">${OB.ownership?'✓':''}</div><div><div style="font-weight:600;font-size:13px">Ownership confirmed</div><div class="faint" style="font-size:11px">${OB.ownDoc?esc(OB.ownDoc):'Title / mortgage / council tax'}</div></div></div>`;
  if(s===4) body=`<div class="faint" style="font-size:12px;margin-bottom:12px">Add their first property (optional now — add more later from their record).</div>
    <div class="fg"><label>Address</label><input id="ob-addr" value="${esc(OB.addr)}" placeholder="e.g. 12 High Street"></div>
    <div class="grid3" style="gap:10px"><div class="fg"><label>Town/City</label><input id="ob-city" value="${esc(OB.city)}"></div>
    <div class="fg"><label>Rent £/mo</label><input id="ob-rent" type="number" value="${esc(OB.rent)}"></div>
    <div class="fg"><label>Beds</label><input id="ob-beds" type="number" value="${esc(OB.beds)}"></div></div>
    <div class="hint" style="color:var(--faint)">Compliance docs (gas/EICR/EPC) upload in the property's compliance tab — same engine as the landlord app.</div>`;
  if(s===5){ const rent=parseInt(OB.rent)||0; const isF=OB.service==='full';
    body=`<div class="faint" style="font-size:12px;margin-bottom:12px">Pick the service level and set your fee — this becomes the instruction recorded in the management agreement.</div>
    <div class="fg"><label>Service level</label><select id="ob-service" onchange="OB.service=this.value;renderOnboard()">
      <option value="full" ${isF?'selected':''}>Full management</option><option value="letonly" ${!isF?'selected':''}>Let-only (one-off)</option></select></div>
    <div class="fg"><label>Your fee <span class="faint">(editable)</span></label>
      <div class="feebox">${isF?`<input id="ob-fee" type="number" step="0.5" value="${OB.feePct}" oninput="_obFee()"> <span>% of monthly rent</span>`:`<input id="ob-weeks" type="number" step="0.5" value="${OB.letWeeks}" oninput="_obFee()"> <span>weeks' rent (one-off)</span>`}</div></div>
    <div class="note" id="ob-feenote">${isF
      ? `<b>Full management.</b> ${rent?'Your fee: <b>'+gbp(rent*OB.feePct/100)+'/mo</b>. ':''}Compliance, repairs, inspections, renewals. Tenant pays landlord directly (no client money).`
      : `<b>Let-only.</b> ${rent?'Your fee: <b>'+gbp(rent/4.345*OB.letWeeks)+'</b> one-off. ':''}Find tenant, paperwork, hand over. No ongoing fee.`}</div>`;
  }
  if(s===6){ const isF=OB.service==='full';
    body=`<div class="note" style="margin-bottom:14px">The Management Agreement + Terms of Business are auto-filled with the details below and sent for e-signature (same engine your tenants use). You can market only once it's signed.</div>
    <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:12.5px;line-height:1.8;margin-bottom:14px">
      <b>${esc(OB.name||'Landlord')}</b> · ${SVC[OB.service].label}<br>
      Fee: <b>${isF?OB.feePct+'% of monthly rent':OB.letWeeks+" weeks' rent (one-off)"}</b><br>
      ${OB.addr?esc(OB.addr)+'<br>':''}AML: ${OB.aml?'✓':'✗'} · Ownership: ${OB.ownership?'✓':'✗'} · PRS: ${OB.prsReg?esc(OB.prsReg):'pending'}<br>
      Redress: ${S.agency.redress||'pending'} · Tenant pays landlord directly · no client money held</div>
    <div class="chk ${OB.agreement?'on':''}" onclick="OB.agreement=!OB.agreement;renderOnboard()"><div class="box">${OB.agreement?'✓':''}</div><div><div style="font-weight:600;font-size:13px">Management agreement signed</div><div class="faint" style="font-size:11px">e-signed &amp; returned (tick to simulate)</div></div></div>`;
  }
  const ft = s<6
    ? `<button class="btn" onclick="obBack()">${s===1?'Cancel':'Back'}</button><button class="btn navy" onclick="obNext()">Next →</button>`
    : `<button class="btn" onclick="obBack()">Back</button><button class="btn navy" onclick="obFinish()">Finish onboarding</button>`;
  modal('Onboard a landlord', stepper+body, ft);
}
function _obFee(){ const isF=OB.service==='full'; if(isF)OB.feePct=parseFloat(val('ob-fee'))||0; else OB.letWeeks=parseFloat(val('ob-weeks'))||0;
  const rent=parseInt(OB.rent)||0; const el=document.getElementById('ob-feenote');
  if(el) el.innerHTML=isF?`<b>Full management.</b> ${rent?'Your fee: <b>'+gbp(rent*OB.feePct/100)+'/mo</b>. ':''}Compliance, repairs, inspections, renewals. Tenant pays landlord directly (no client money).`
    :`<b>Let-only.</b> ${rent?'Your fee: <b>'+gbp(rent/4.345*OB.letWeeks)+'</b> one-off. ':''}Find tenant, paperwork, hand over. No ongoing fee.`; }

// ── EDIT INSTRUCTION & FEE (per landlord) ──
function editInstruction(id){ const l=L(id);
  const body=`<div class="fg"><label>Service level</label><select id="ei-service" onchange="document.getElementById('ei-fee-wrap').innerHTML=this.value==='full'?'<input id=\\'ei-fee\\' type=number step=0.5 value=${l.feePct!=null?l.feePct:DEF_FEE}> % of monthly rent':'<input id=\\'ei-weeks\\' type=number step=0.5 value=${l.letWeeks!=null?l.letWeeks:DEF_WEEKS}> weeks rent (one-off)'">
    <option value="full" ${l.service==='full'?'selected':''}>Full management</option><option value="letonly" ${l.service==='letonly'?'selected':''}>Let-only</option></select></div>
    <div class="fg"><label>Your fee (editable)</label><div class="feebox" id="ei-fee-wrap">${l.service==='full'?`<input id="ei-fee" type="number" step="0.5" value="${l.feePct!=null?l.feePct:DEF_FEE}"> % of monthly rent`:`<input id="ei-weeks" type="number" step="0.5" value="${l.letWeeks!=null?l.letWeeks:DEF_WEEKS}"> weeks' rent (one-off)`}</div></div>`;
  modal('Edit instruction & fee', body, `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn navy" onclick="saveInstruction('${id}')">Save</button>`);
}
function saveInstruction(id){ const l=L(id); l.service=val('ei-service'); if(l.service==='full')l.feePct=parseFloat(val('ei-fee'))||DEF_FEE; else l.letWeeks=parseFloat(val('ei-weeks'))||DEF_WEEKS;
  l.comms=l.comms||[]; l.comms.push({id:uid('c'),date:today(),type:'Note',note:'Instruction updated · '+SVC[l.service].label+' · fee '+(l.service==='full'?l.feePct+'%':l.letWeeks+' wks')});
  save(); pushLandlord(l); closeModal(); render(); toast('✓ Instruction updated'); }

// ── COMMS (keep in touch) ──
function openComm(id){ const body=`<div class="fg"><label>Type</label><select id="cm-type"><option>Call</option><option>Email</option><option>WhatsApp</option><option>Meeting</option><option>Note</option></select></div>
  <div class="fg"><label>Note</label><textarea id="cm-note" rows="3" placeholder="What was discussed / actioned"></textarea></div>`;
  modal('Log contact', body, `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn navy" onclick="saveComm('${id}')">Save</button>`); }
function saveComm(id){ const l=L(id); const note=val('cm-note'); if(!note){toast('Add a note',1);return;}
  l.comms=l.comms||[]; l.comms.push({id:uid('c'),date:today(),type:val('cm-type'),note}); save(); pushLandlord(l); closeModal(); render(); toast('✓ Contact logged'); }

// ── DOC UPLOAD / PROPERTY ADD ──
function uploadDoc(id,col){ const l=L(id); l.docs=l.docs||{}; const def=col==='id'?'id_document.pdf':col==='ownership'?'proof_of_ownership.pdf':'mgmt_agreement.pdf';
  const body=`<div class="fg"><label>${col==='id'?'Photo ID (AML)':col==='ownership'?'Proof of ownership':'Signed agreement'}</label><input id="ud-name" value="" placeholder="${def}"><div class="hint">In production this opens a file picker + AI scan. Enter a filename to simulate.</div></div>`;
  modal('Upload document', body, `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn navy" onclick="saveUploadDoc('${id}','${col}','${def}')">Attach</button>`); }
function saveUploadDoc(id,col,def){ var n=val('ud-name')||def; var l=S.landlords.find(x=>x.id===id); l.docs=l.docs||{}; l.docs[col]=n; if(col==='id')l.aml=true; if(col==='ownership')l.ownership=true; if(col==='agreement'){l.agreement=true;l.status='active';} save(); pushLandlord(l); closeModal(); render(); toast('✓ Document attached'); }
function addProperty(id){ const l=L(id); const defFee=(l.feePct!=null?l.feePct:DEF_FEE); const body=`<div class="fg"><label>Address</label><input id="ap-addr" placeholder="e.g. 12 High Street"></div>
  <div class="grid3" style="gap:10px"><div class="fg"><label>Town/City</label><input id="ap-city"></div><div class="fg"><label>Rent £/mo</label><input id="ap-rent" type="number"></div><div class="fg"><label>Beds</label><input id="ap-beds" type="number" value="2"></div></div>
  ${l.service==='full'?`<div class="fg"><label>Management fee for this property (%)</label><input id="ap-fee" type="number" step="0.5" value="${defFee}"><div class="hint">Defaults to ${defFee}% — change it to give this property a different rate (e.g. family/friends).</div></div>`:''}`;
  modal('Add property', body, `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn navy" onclick="saveAddProperty('${id}')">Add</button>`); }
function saveAddProperty(id){ var a=val('ap-addr'); if(!a){toast('Enter an address',1);return;} var pid=uid('p'); var fEl=document.getElementById('ap-fee');
  var pp={id:pid,landlordId:id,address:a,city:val('ap-city'),rent:parseInt(val('ap-rent'))||0,beds:parseInt(val('ap-beds'))||1,feePct:fEl?parseFloat(fEl.value):undefined};
  var tn={id:uid('t'),who:a,propertyId:pid,stage:'instructed'};
  S.properties.push(pp); S.tenancies.push(tn); save(); pushProperty(pp); pushTenancy(tn); closeModal(); render(); toast('✓ Property added'); }

// ── REFERENCE MODAL ──
let RF=null;
function openReference(id){
  const ex=id?S.references.find(r=>r.id===id):null;
  RF= ex?JSON.parse(JSON.stringify(ex)):{id:uid('r'),applicant:'',propertyId:(S.properties[0]||{}).id||'',income:'',docs:{id:false,rtr:false,income:false,employer:false,prevll:false},credit:'',creditState:'not_requested',status:'none',note:''};
  renderReference();
}
const DOCS=[['id','Photo ID verified'],['rtr','Right-to-Rent share code'],['income','Proof of income (payslips/bank)'],['employer','Employer reference'],['prevll','Previous landlord reference']];
function renderReference(){
  const rent=P(RF.propertyId).rent||0; const need=rent*30; const afford=RF.income&&parseInt(RF.income)>=need;
  const propOpts=S.properties.map(p=>`<option value="${p.id}" ${p.id===RF.propertyId?'selected':''}>${esc(p.address)} — ${gbp(p.rent)}/mo</option>`).join('');
  const cr=CREDIT[RF.creditState||'not_requested'];
  const body=`
    <div class="fg"><label>Applicant name</label><input id="rf-app" value="${esc(RF.applicant)}" placeholder="Tenant applicant"></div>
    <div class="fg"><label>Property</label><select id="rf-prop" onchange="RF.applicant=val('rf-app');RF.income=val('rf-income');RF.propertyId=this.value;renderReference()">${propOpts}</select></div>
    <div class="fg"><label>Applicant annual income (£)</label><input id="rf-income" type="number" value="${esc(RF.income)}" oninput="_affLive()" placeholder="e.g. 42000">
      <div class="hint" id="rf-aff">${rent?`Affordability: income must be ≥ ${gbp(need)}/yr (30× rent). `+(RF.income?(afford?'<b style="color:var(--green)">✓ Passes</b>':'<b style="color:var(--amber)">Below threshold</b>'):''):''}</div></div>
    <label style="display:block;font-size:12px;font-weight:600;margin-bottom:7px">In-house checks (no licence needed)</label>
    ${DOCS.map(([k,t])=>`<div class="chk ${RF.docs[k]?'on':''}" onclick="RF.docs['${k}']=!RF.docs['${k}'];renderReference()"><div class="box">${RF.docs[k]?'✓':''}</div><div style="font-size:13px">${t}</div></div>`).join('')}
    <div style="background:var(--off);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div><div style="font-size:13px;font-weight:700;color:var(--navy)">Credit check ${S.agency.refPartner?'· '+esc(S.agency.refPartner):''}</div>
          <div class="faint" style="font-size:11.5px">Regulated CCJ/score + Open Banking via partner</div></div>
        <span class="pill" style="background:${cr.bg};color:${cr.color}">${cr.label}</span></div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        ${RF.creditState==='not_requested'?`<button class="btn sm" onclick="_credit('requested')">Request credit check (API)</button>`:''}
        ${RF.creditState==='requested'?`<button class="btn sm" onclick="_credit('in_progress')">Mark in progress</button>`:''}
        ${(RF.creditState==='in_progress'||RF.creditState==='requested')?`<button class="btn sm navy" onclick="_credit('complete')">Attach result</button>`:''}
        ${RF.creditState==='complete'?`<span class="faint" style="font-size:12px;align-self:center">✓ ${esc(RF.credit||'Report attached')}</span>`:''}
      </div>
      <div class="hint" style="margin-top:8px">"Request credit check" is the API hook your developer wires to ${S.agency.refPartner||'your partner'}. Until then, run it in their portal and click "Attach result".</div>
    </div>
    <div class="fg" style="margin-top:14px"><label>Overall outcome</label><select id="rf-status"><option value="none" ${RF.status==='none'?'selected':''}>Not decided</option><option value="green" ${RF.status==='green'?'selected':''}>● Pass — proceed</option><option value="amber" ${RF.status==='amber'?'selected':''}>● Caution — guarantor / conditions</option><option value="red" ${RF.status==='red'?'selected':''}>● Fail — decline</option></select></div>
    <div class="fg"><label>Notes</label><textarea id="rf-note" rows="2">${esc(RF.note)}</textarea></div>`;
  modal('Tenant reference', body, `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn navy" onclick="saveReference()">Save reference</button>`);
}
function _affLive(){ const rent=P(RF.propertyId).rent||0; const need=rent*30; const inc=parseInt(val('rf-income'))||0; const el=document.getElementById('rf-aff'); if(el&&rent) el.innerHTML=`Affordability: income must be ≥ ${gbp(need)}/yr (30× rent). `+(inc?(inc>=need?'<b style="color:var(--green)">✓ Passes</b>':'<b style="color:var(--amber)">Below threshold</b>'):''); }
function _credit(stateTo){ RF.applicant=val('rf-app'); RF.income=parseInt(val('rf-income'))||0; RF.note=val('rf-note'); RF.status=val('rf-status');
  if(stateTo==='complete'){ RF.credit='credit_report_'+RF.id+'.pdf'; }
  RF.creditState=stateTo; renderReference(); toast(stateTo==='requested'?'Credit check requested via partner':stateTo==='complete'?'✓ Credit report attached':'Marked in progress'); }
function saveReference(){
  RF.applicant=val('rf-app'); RF.income=parseInt(val('rf-income'))||0; RF.note=val('rf-note'); RF.status=val('rf-status');
  if(!RF.applicant){toast('Enter applicant name',1);return;}
  const i=S.references.findIndex(r=>r.id===RF.id);
  if(i>=0) S.references[i]=RF; else S.references.push(RF);
  save(); pushReference(RF); closeModal(); go('referencing'); toast('✓ Reference saved');
}

function signAgreement(id){ const l=L(id); l.agreement=true; l.status='active'; l.docs=l.docs||{}; l.docs.agreement=l.docs.agreement||'mgmt_agreement.pdf';
  l.comms=l.comms||[]; l.comms.push({id:uid('c'),date:today(),type:'Note',note:'Management agreement signed — now live.'}); save(); pushLandlord(l); render(); toast('✓ Agreement signed — '+l.name+' is live'); }

// ── helpers ──
function initials(n){ return (n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function esc(v){ return v==null?'':String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
function modal(title,body,ft){ document.getElementById('modal-root').innerHTML=`<div class="ov" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-hd"><h3>${title}</h3><button class="x" onclick="closeModal()">×</button></div><div class="modal-bd">${body}</div><div class="modal-ft">${ft}</div></div></div>`; }
function closeModal(){ document.getElementById('modal-root').innerHTML=''; OB=null; RF=null; }
let _tt; function toast(m,bad){ const t=document.getElementById('toast'); t.textContent=m; t.style.background=bad?'var(--red)':'var(--navy)'; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2600); }

boot();
</script>
</body>
</html>
